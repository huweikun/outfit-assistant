<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="穿搭助手">
<meta name="theme-color" content="#f8f4f0">
<title>穿搭助手</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg: #f8f4f0;
  --card: #ffffff;
  --text: #2d2d2d;
  --sub: #8a8a8a;
  --accent: #d4a574;
  --accent2: #b8896a;
  --danger: #e88b8b;
  --border: #e8e0d8;
  --shadow: 0 2px 12px rgba(0,0,0,.06);
  --radius: 16px;
  --nav-h: 72px;
  --safe-b: env(safe-area-inset-bottom, 16px);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; min-height: -webkit-fill-available;
  padding-bottom: calc(var(--nav-h) + var(--safe-b) + 16px);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* Header */
.header {
  position: sticky; top: 0; z-index: 10;
  background: rgba(248,244,240,.88); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 12px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.header h1 { font-size: 1.3rem; font-weight: 600; letter-spacing: -.02em; }
.header .date { font-size: .82rem; color: var(--sub); }

/* Screen visibility */
.screen { display: none; }
.screen.active { display: block; }

/* Bottom nav */
.bottom-nav {
  position: fixed; bottom: 0; left:0; right:0; z-index: 10;
  background: rgba(255,255,255,.92); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: flex; justify-content: space-around;
  padding: 8px 0 var(--safe-b);
  border-top: 1px solid var(--border);
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; color: var(--sub); font-size: .68rem;
  cursor: pointer; padding: 4px 12px; transition: color .15s;
  -webkit-tap-highlight-color: transparent;
}
.nav-item .icon { font-size: 1.4rem; }
.nav-item.active { color: var(--accent); }

/* Cards */
.card {
  background: var(--card); border-radius: var(--radius);
  padding: 16px; margin: 0 16px 12px;
  box-shadow: var(--shadow);
}

/* Section title */
.sec-title {
  font-size: .9rem; font-weight: 600; color: var(--sub);
  margin: 20px 20px 10px; letter-spacing: .04em;
}

/* Outfit display */
.outfit-display {
  display: flex; flex-direction: column; gap: 10px; margin: 16px 16px 12px;
}
.outfit-row {
  display: flex; gap: 10px; justify-content: center;
}
.outfit-item {
  flex: 1; max-width: 160px;
  background: var(--card); border-radius: var(--radius);
  overflow: hidden; box-shadow: var(--shadow);
  position: relative;
}
.outfit-item img {
  width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block;
}
.outfit-item .label {
  padding: 8px 10px; font-size: .75rem; color: var(--sub); text-align: center;
  background: #fafafa;
}
.outfit-item .cat-badge {
  position: absolute; top: 8px; left: 8px;
  background: rgba(0,0,0,.5); color: #fff; font-size: .65rem;
  padding: 3px 8px; border-radius: 10px;
}

/* Grid */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 0 16px 12px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 0 16px 12px; }

/* Chips */
.chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
.chip {
  padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--card); font-size: .82rem; cursor: pointer; transition: all .15s;
  color: var(--text); -webkit-tap-highlight-color: transparent;
}
.chip.selected { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 12px 24px; border-radius: 24px; border: none;
  font-size: .9rem; font-weight: 500; cursor: pointer; transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.btn-primary { background: var(--accent); color: #fff; width: 100%; }
.btn-primary:active { background: var(--accent2); transform: scale(.98); }
.btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
.btn-outline:active { background: rgba(212,165,116,.1); }
.btn-sm { padding: 6px 14px; font-size: .78rem; border-radius: 16px; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-block { width: calc(100% - 32px); margin: 0 16px; }

/* Form */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: .78rem; color: var(--sub); margin-bottom: 4px; font-weight: 500; }
.form-group select, .form-group input[type=text] {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border);
  border-radius: 12px; font-size: .9rem; background: #fafafa; color: var(--text);
  -webkit-appearance: none;
}

/* Photo capture area */
.photo-capture {
  width: 100%; aspect-ratio: 3/4; border-radius: var(--radius);
  border: 2px dashed var(--border); display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; background: #fafafa; transition: border-color .2s;
  overflow: hidden; position: relative;
}
.photo-capture:active { border-color: var(--accent); }
.photo-capture img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
.photo-capture .hint { color: var(--sub); font-size: .82rem; z-index: 1; }
.photo-capture .hint .icon { font-size: 2.2rem; display: block; margin-bottom: 6px; }
.photo-capture.has-photo .hint { display: none; }

/* Calendar */
.cal-header { display: flex; justify-content: space-between; align-items: center; padding: 0 16px; margin-bottom: 10px; }
.cal-header button { background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 4px 8px; }
.cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); text-align: center; font-size: .7rem; color: var(--sub); margin: 0 16px 6px; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; margin: 0 16px; }
.cal-cell {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  border-radius: 12px; font-size: .85rem; cursor: pointer; position: relative;
}
.cal-cell.today { background: var(--accent); color: #fff; font-weight: 600; }
.cal-cell.has-outfit::after { content: ''; position: absolute; bottom: 4px; width: 5px; height: 5px; border-radius: 50%; background: var(--accent2); }
.cal-cell.today.has-outfit::after { background: #fff; }
.cal-cell.other { color: #ccc; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,.4); align-items: flex-end; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-sheet {
  background: var(--card); border-radius: 20px 20px 0 0;
  padding: 20px 16px calc(20px + var(--safe-b)); width: 100%; max-height: 80vh;
  overflow-y: auto; animation: slideUp .25s ease-out;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px; }

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 200;
  background: rgba(0,0,0,.8); color: #fff; padding: 10px 24px;
  border-radius: 20px; font-size: .85rem; opacity: 0; transition: opacity .3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* Empty state */
.empty-state { text-align: center; padding: 48px 20px; color: var(--sub); }
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state p { font-size: .9rem; }

/* Item detail */
.item-card { cursor: pointer; transition: transform .15s; }
.item-card:active { transform: scale(.98); }
.item-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 12px; display: block; }
.item-card .info { padding: 6px 2px; }
.item-card .name { font-size: .8rem; font-weight: 500; }
.item-card .meta { font-size: .7rem; color: var(--sub); }
.item-card .worn-count { font-size: .65rem; color: var(--accent); }

/* Category tabs */
.cat-tabs {
  display: flex; gap: 6px; margin: 0 16px 12px; overflow-x: auto;
  -webkit-overflow-scrolling: touch; padding-bottom: 4px;
}
.cat-tab {
  padding: 7px 14px; border-radius: 18px; border: 1px solid var(--border);
  background: var(--card); font-size: .78rem; white-space: nowrap;
  cursor: pointer; flex-shrink: 0; transition: all .15s;
}
.cat-tab.selected { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Scene selector */
.scene-selector { display: flex; gap: 8px; margin: 12px 16px; overflow-x: auto; padding-bottom: 4px; }
.scene-chip {
  padding: 7px 14px; border-radius: 18px; border: 1px solid var(--border);
  background: var(--card); font-size: .78rem; white-space: nowrap;
  cursor: pointer; flex-shrink: 0;
}
.scene-chip.selected { background: #5b7a9e; color: #fff; border-color: #5b7a9e; }

/* Action bar */
.action-bar { display: flex; gap: 10px; margin: 12px 16px; }

/* Outfit detail page */
.outfit-full { margin: 0 16px; }
.outfit-full .outfit-item { max-width: 100%; margin-bottom: 8px; }

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1 id="headerTitle">今日穿搭</h1>
  <span class="date" id="headerDate"></span>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Screen: Today's Outfit -->
<div class="screen active" id="screen-today">
  <div class="sec-title">选择场景</div>
  <div class="scene-selector" id="sceneSelector">
    <span class="scene-chip selected" data-scene="daily">日常通勤</span>
    <span class="scene-chip" data-scene="casual">休闲周末</span>
    <span class="scene-chip" data-scene="date">约会</span>
    <span class="scene-chip" data-scene="sport">运动</span>
    <span class="scene-chip" data-scene="party">聚会</span>
  </div>

  <div class="sec-title">今日推荐</div>
  <div class="outfit-display" id="outfitDisplay"></div>
  <div class="action-bar">
    <button class="btn btn-primary" onclick="generateOutfit()" style="flex:1">🔄 换一套</button>
    <button class="btn btn-outline" onclick="saveTodayOutfit()">✅ 今天就穿这套</button>
  </div>
  <button class="btn btn-outline btn-sm btn-block" onclick="switchTab('wardrobe')" style="margin-top:4px">👗 手动调整单品</button>
</div>

<!-- Screen: Wardrobe -->
<div class="screen" id="screen-wardrobe">
  <div class="cat-tabs" id="catTabs">
    <span class="cat-tab selected" data-cat="all">全部</span>
    <span class="cat-tab" data-cat="top">上衣</span>
    <span class="cat-tab" data-cat="bottom">裤子/裙</span>
    <span class="cat-tab" data-cat="dress">连衣裙</span>
    <span class="cat-tab" data-cat="outer">外套</span>
    <span class="cat-tab" data-cat="shoe">鞋子</span>
    <span class="cat-tab" data-cat="acc">配饰</span>
  </div>
  <div class="grid2" id="wardrobeGrid"></div>
  <div class="empty-state" id="wardrobeEmpty">
    <div class="icon">👗</div>
    <p>衣橱还是空的</p>
    <p style="font-size:.78rem;margin-top:4px">点击下方 + 添加你的第一件衣服吧</p>
  </div>
</div>

<!-- Screen: Add Item -->
<div class="screen" id="screen-add">
  <div class="card" style="margin-top:16px">
    <div class="photo-capture" id="photoCapture" onclick="document.getElementById('photoInput').click()">
      <div class="hint"><span class="icon">📸</span>点击拍照或上传照片</div>
    </div>
    <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)">

    <div style="margin-top:16px">
      <div class="form-group">
        <label>名称（选填）</label>
        <input type="text" id="itemName" placeholder="例如：白色真丝衬衫">
      </div>
      <div class="form-group">
        <label>分类</label>
        <select id="itemCat">
          <option value="top">上衣</option>
          <option value="bottom">裤子/半裙</option>
          <option value="dress">连衣裙</option>
          <option value="outer">外套</option>
          <option value="shoe">鞋子</option>
          <option value="acc">配饰</option>
        </select>
      </div>
      <div class="form-group">
        <label>颜色</label>
        <div class="chip-row" id="colorChips"></div>
      </div>
      <div class="form-group">
        <label>季节</label>
        <div class="chip-row" id="seasonChips"></div>
      </div>
      <div class="form-group">
        <label>场合（可多选）</label>
        <div class="chip-row" id="occasionChips"></div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="saveItem()" style="margin-top:8px" id="saveBtn">保存到衣橱</button>
    <button class="btn btn-outline btn-block btn-sm hidden" onclick="cancelEdit()" style="margin-top:8px" id="cancelBtn">取消编辑</button>
  </div>
</div>

<!-- Screen: Calendar -->
<div class="screen" id="screen-calendar">
  <div class="cal-header" style="margin-top:16px">
    <button onclick="calPrevMonth()">◀</button>
    <span id="calMonthLabel" style="font-weight:600"></span>
    <button onclick="calNextMonth()">▶</button>
  </div>
  <div class="cal-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="sec-title" style="margin-top:20px">选中日期的穿搭</div>
  <div id="calOutfitDetail" style="margin:0 16px"></div>
</div>

<!-- Screen: Favorites -->
<div class="screen" id="screen-favorites">
  <div class="sec-title" style="margin-top:16px">我的最爱组合</div>
  <div id="favList"></div>
  <div class="empty-state" id="favEmpty">
    <div class="icon">💝</div>
    <p>还没有收藏的搭配</p>
    <p style="font-size:.78rem;margin-top:4px">在"今日穿搭"中保存喜欢的搭配，这里就会出现</p>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="nav-item active" data-screen="today" onclick="switchTab('today')">
    <span class="icon">✨</span>今日穿搭
  </button>
  <button class="nav-item" data-screen="wardrobe" onclick="switchTab('wardrobe')">
    <span class="icon">👗</span>衣橱
  </button>
  <button class="nav-item" data-screen="add" onclick="switchTab('add')">
    <span class="icon">➕</span>添加
  </button>
  <button class="nav-item" data-screen="calendar" onclick="switchTab('calendar')">
    <span class="icon">📅</span>日历
  </button>
  <button class="nav-item" data-screen="favorites" onclick="switchTab('favorites')">
    <span class="icon">💝</span>收藏
  </button>
</div>

<script>
// ═══════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════

const COLORS = [
  { id:'white', name:'白色', hex:'#f5f5f5', family:'neutral' },
  { id:'black', name:'黑色', hex:'#2d2d2d', family:'neutral' },
  { id:'gray', name:'灰色', hex:'#9e9e9e', family:'neutral' },
  { id:'beige', name:'米色', hex:'#e8d5c4', family:'neutral' },
  { id:'navy', name:'藏蓝', hex:'#2c3e6b', family:'cool' },
  { id:'lightblue', name:'浅蓝', hex:'#a8d8ea', family:'cool' },
  { id:'blue', name:'蓝色', hex:'#5b8fbf', family:'cool' },
  { id:'green', name:'绿色', hex:'#7ba882', family:'cool' },
  { id:'pink', name:'粉色', hex:'#e8b4c4', family:'warm' },
  { id:'red', name:'红色', hex:'#c94c4c', family:'warm' },
  { id:'orange', name:'橙色', hex:'#e8a87c', family:'warm' },
  { id:'yellow', name:'黄色', hex:'#e8d878', family:'warm' },
  { id:'purple', name:'紫色', hex:'#b49cc4', family:'cool' },
  { id:'brown', name:'棕色', hex:'#a0826c', family:'warm' },
  { id:'khaki', name:'卡其', hex:'#c4b89c', family:'warm' },
  { id:'denim', name:'牛仔蓝', hex:'#6b8eaa', family:'cool' },
];

const SEASONS = [
  { id:'spring', name:'🌸 春季' },
  { id:'summer', name:'☀️ 夏季' },
  { id:'autumn', name:'🍂 秋季' },
  { id:'winter', name:'❄️ 冬季' },
];

const OCCASIONS = [
  { id:'daily', name:'日常通勤' },
  { id:'casual', name:'休闲周末' },
  { id:'date', name:'约会' },
  { id:'sport', name:'运动' },
  { id:'party', name:'聚会' },
];

const CAT_NAMES = { top:'上衣', bottom:'裤子/半裙', dress:'连衣裙', outer:'外套', shoe:'鞋子', acc:'配饰' };

// Color family compatibility matrix
// neutral goes with everything
// same family = harmonious
// cool+warm = be careful
const COLOR_FAMILY = {};
COLORS.forEach(c => { COLOR_FAMILY[c.id] = c.family; });

function colorCompatible(c1, c2) {
  if (c1 === c2) return 0.6; // same color, ok but less interesting
  const f1 = COLOR_FAMILY[c1], f2 = COLOR_FAMILY[c2];
  if (f1 === 'neutral' || f2 === 'neutral') return 1.0;
  if (f1 === f2) return 0.9;
  // Specific bad combinations
  const bad = [['red','green'],['red','pink'],['orange','pink'],['red','orange']];
  const pair = [c1,c2].sort().join(',');
  for (const b of bad) { if (pair === b.sort().join(',')) return 0.1; }
  return 0.5; // different family, not terrible
}

// ═══════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════

const STORAGE_KEY = 'outfit_db';

function loadDB() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { items:[], outfits:[], favorites:[] };
  } catch(e) { return { items:[], outfits:[], favorites:[] }; }
}

function saveDB(db) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
  } catch(e) {
    showToast('存储空间不足，请删除一些衣服照片');
  }
}

function getDB() { return loadDB(); }

// ═══════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 2000);
}

function getCurrentSeason() {
  const m = new Date().getMonth() + 1;
  if (m >= 3 && m <= 5) return 'spring';
  if (m >= 6 && m <= 8) return 'summer';
  if (m >= 9 && m <= 11) return 'autumn';
  return 'winter';
}

function formatDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════

let currentTab = 'today';
let currentCat = 'all';
const titles = { today:'今日穿搭', wardrobe:'我的衣橱', add:'添加衣服', calendar:'穿搭日历', favorites:'我的最爱' };

function switchTab(tab, data) {
  currentTab = tab;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.querySelector(`.nav-item[data-screen="${tab}"]`).classList.add('active');
  document.getElementById('headerTitle').textContent = titles[tab];

  if (tab === 'today') { renderToday(); renderSceneSelector(); }
  if (tab === 'wardrobe') renderWardrobe();
  if (tab === 'add') { if (data) fillEditForm(data); else resetAddForm(); }
  if (tab === 'calendar') renderCalendar();
  if (tab === 'favorites') renderFavorites();

  window.scrollTo(0, 0);
}

// ═══════════════════════════════════════
// SCENE SELECTOR
// ═══════════════════════════════════════

let currentScene = 'daily';

function renderSceneSelector() {
  document.querySelectorAll('#sceneSelector .scene-chip').forEach(chip => {
    chip.classList.toggle('selected', chip.dataset.scene === currentScene);
    chip.onclick = () => {
      currentScene = chip.dataset.scene;
      renderSceneSelector();
      generateOutfit();
    };
  });
}

// ═══════════════════════════════════════
// TODAY'S OUTFIT
// ═══════════════════════════════════════

function generateOutfit() {
  const db = getDB();
  const season = getCurrentSeason();
  const scene = currentScene;

  // Filter items by season and occasion
  const byCat = {};
  ['top','bottom','dress','outer','shoe','acc'].forEach(c => { byCat[c] = []; });

  db.items.forEach(item => {
    const cat = item.category;
    if (!byCat[cat]) byCat[cat] = [];
    // Season filter (item's seasons include current season, or no season set = all)
    const seasonMatch = !item.seasons || item.seasons.length === 0 || item.seasons.includes(season);
    const occasionMatch = !item.occasions || item.occasions.length === 0 || item.occasions.includes(scene);
    if (seasonMatch && occasionMatch) byCat[cat].push(item);
  });

  // Get recently worn items (last 3 days)
  const recentIds = new Set();
  const threeDaysAgo = new Date();
  threeDaysAgo.setDate(threeDaysAgo.getDate() - 3);
  db.outfits.forEach(o => {
    if (new Date(o.date) >= threeDaysAgo) {
      o.items.forEach(id => recentIds.add(id));
    }
  });

  // Scoring function for an item
  function scoreItem(item) {
    let s = 0;
    // Prefer less-worn items
    s += (10 - Math.min(item.timesWorn || 0, 10)) * 2;
    // Penalize recently worn
    if (recentIds.has(item.id)) s -= 50;
    // Slight random for variety
    s += Math.random() * 5;
    return s;
  }

  // Build outfit
  const outfit = [];

  // Decide: dress-based or separates-based
  const dresses = (byCat['dress'] || []).filter(d => !recentIds.has(d.id)).sort((a,b) => scoreItem(b) - scoreItem(a));
  const tops = (byCat['top'] || []).filter(t => !recentIds.has(t.id)).sort((a,b) => scoreItem(b) - scoreItem(a));
  const bottoms = (byCat['bottom'] || []).filter(b => !recentIds.has(b.id)).sort((a,b) => scoreItem(b) - scoreItem(a));
  const outers = (byCat['outer'] || []).filter(o => !recentIds.has(o.id)).sort((a,b) => scoreItem(b) - scoreItem(a));
  const shoes = (byCat['shoe'] || []).filter(s => !recentIds.has(s.id)).sort((a,b) => scoreItem(b) - scoreItem(a));

  // Prefer dress if available (simpler outfit)
  const useDress = dresses.length > 0 && Math.random() > 0.3;

  if (useDress) {
    outfit.push(dresses[0]);
    // Add outer if it's not summer
    if (season !== 'summer' && outers.length > 0) {
      outfit.push(outers[0]);
    }
  } else if (tops.length > 0 && bottoms.length > 0) {
    // Pick best color-compatible top+bottom pair
    let bestPair = null, bestScore = -Infinity;
    const topCands = tops.slice(0, 5);
    const bottomCands = bottoms.slice(0, 5);
    topCands.forEach(t => {
      bottomCands.forEach(b => {
        const compat = colorCompatible(t.color, b.color);
        const score = scoreItem(t) + scoreItem(b) + compat * 20;
        if (score > bestScore) { bestScore = score; bestPair = [t, b]; }
      });
    });
    if (bestPair) { outfit.push(bestPair[0]); outfit.push(bestPair[1]); }
    else { outfit.push(tops[0]); if (bottoms[0]) outfit.push(bottoms[0]); }

    // Add outer layer for non-summer
    if (season !== 'summer' && outers.length > 0 && outfit.length >= 2) {
      const outer = outers[0];
      const innerColor = outfit[0].color;
      if (colorCompatible(outer.color, innerColor) > 0.3) {
        outfit.push(outer);
      }
    }
  } else {
    // Fallback: just pick whatever we have
    if (tops[0]) outfit.push(tops[0]);
    if (bottoms[0]) outfit.push(bottoms[0]);
  }

  // Add shoes
  if (shoes.length > 0) outfit.push(shoes[0]);

  currentOutfit = outfit;
  renderOutfitDisplay(outfit);
}

      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  };

  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

function resetAddForm() {

function renderChips() {
  // Color chips
  const colorContainer = document.getElementById('colorChips');
  colorContainer.innerHTML = COLORS.map(c =>
    `<span class="chip" data-value="${c.id}" style="display:inline-flex;align-items:center;gap:6px" onclick="toggleChip(this,'single','colorChips')">
      <span style="width:16px;height:16px;border-radius:50%;background:${c.hex};border:1px solid #ddd;display:inline-block"></span>${c.name}
    </span>`
  ).join('');

  // Season chips
  const seasonContainer = document.getElementById('seasonChips');
  seasonContainer.innerHTML = SEASONS.map(s =>
    `<span class="chip" data-value="${s.id}" onclick="toggleChip(this,'multi','seasonChips')">${s.name}</span>`
  ).join('');

  const occContainer = document.getElementById('occasionChips');
  occContainer.innerHTML = OCCASIONS.map(o =>
    `<span class="chip" data-value="${o.id}" onclick="toggleChip(this,'multi','occasionChips')">${o.name}</span>`

function toggleChip(el, mode, groupId) {
  if (mode === 'single') {
    document.querySelectorAll(`#${groupId} .chip`).forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
  } else {
    el.classList.toggle('selected');
  }
}

function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(ev) {
    // Compress image
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const maxW = 800;
      const scale = Math.min(1, maxW / img.width);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      capturedPhoto = canvas.toDataURL('image/jpeg', 0.7);

      const pc = document.getElementById('photoCapture');
      pc.classList.add('has-photo');
      pc.querySelector('img')?.remove();
      const preview = document.createElement('img');
      preview.src = capturedPhoto;
      pc.appendChild(preview);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = ''; // Reset input so same file can be re-selected
}

function saveItem() {
  if (!capturedPhoto) { showToast('请先拍照或上传照片'); return; }

  const name = document.getElementById('itemName').value.trim();
  const category = document.getElementById('itemCat').value;

  const colorEl = document.querySelector('#colorChips .chip.selected');
  const color = colorEl ? colorEl.dataset.value : 'black';

  const seasons = Array.from(document.querySelectorAll('#seasonChips .chip.selected')).map(c => c.dataset.value);
  const occasions = Array.from(document.querySelectorAll('#occasionChips .chip.selected')).map(c => c.dataset.value);

  const db = getDB();

  if (editingId) {
    const item = db.items.find(i => i.id === editingId);
    if (item) {
      item.name = name;
      item.category = category;
      item.color = color;
      item.seasons = seasons;
      item.occasions = occasions;
      item.photo = capturedPhoto;
    }
  } else {
    db.items.push({
      id: Date.now().toString(),
      name,
      category,
      color,
      seasons,
      occasions,
      photo: capturedPhoto,
      timesWorn: 0,
      lastWorn: null,
      created: todayStr(),
    });
  }

  saveDB(db);
  showToast(editingId ? '已更新' : '已添加到衣橱');
  switchTab('wardrobe');
}

function cancelEdit() {
  resetAddForm();
  switchTab('wardrobe');
}

let calYear, calMonth, calSelectedDate;

function renderCalendar() {
  const now = new Date();
  if (!calYear) { calYear = now.getFullYear(); calMonth = now.getMonth() + 1; }
  calSelectedDate = todayStr();

  document.getElementById('calMonthLabel').textContent = `${calYear}年${calMonth}月`;

  const firstDay = new Date(calYear, calMonth - 1, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth, 0).getDate();
  const daysInPrevMonth = new Date(calYear, calMonth - 1, 0).getDate();
  const today = todayStr();

  const db = getDB();
  const outfitDates = new Set(db.outfits.map(o => o.date));

  let html = '';
  // Previous month tail
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = daysInPrevMonth - i;
    html += `<div class="cal-cell other">${d}</div>`;
  }
  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === today;
    const hasOutfit = outfitDates.has(dateStr);
    const isSelected = dateStr === calSelectedDate;
    let cls = 'cal-cell';
    if (isToday) cls += ' today';
    if (hasOutfit) cls += ' has-outfit';
    if (isSelected && !isToday) cls += ' selected';
    html += `<div class="cal-cell ${cls}" data-date="${dateStr}" onclick="selectCalDate('${dateStr}')">${d}</div>`;
  }
  // Next month head
  const totalCells = firstDay + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let d = 1; d <= remaining; d++) {
    html += `<div class="cal-cell other">${d}</div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
  renderCalOutfitDetail();
}

function selectCalDate(dateStr) {
  calSelectedDate = dateStr;
  document.querySelectorAll('.cal-cell').forEach(c => c.classList.remove('selected'));
  const cell = document.querySelector(`.cal-cell[data-date="${dateStr}"]`);
  if (cell) cell.classList.add('selected');
  renderCalOutfitDetail();
}

function renderCalOutfitDetail() {
  const db = getDB();
  const outfits = db.outfits.filter(o => o.date === calSelectedDate);
  const container = document.getElementById('calOutfitDetail');

  if (outfits.length === 0) {
    container.innerHTML = `<div style="text-align:center;color:var(--sub);padding:16px">这天还没有穿搭记录</div>`;
    return;
  }

  container.innerHTML = outfits.map(outfit => {
    const items = outfit.items.map(id => db.items.find(i => i.id === id)).filter(Boolean);
    const cats = { top:'上衣', bottom:'下装', dress:'连衣裙', outer:'外套', shoe:'鞋子', acc:'配饰' };
    const sceneName = (OCCASIONS.find(o => o.id === outfit.scene) || {}).name || outfit.scene;
    return `<div class="card" style="margin-bottom:10px">
      <div style="font-weight:600;margin-bottom:8px">${sceneName ? '📍 ' + sceneName : ''}</div>
      <div style="display:flex;gap:8px;overflow-x:auto">
        ${items.map(item => `
          <div style="flex-shrink:0;width:80px">
            <img src="${item.photo}" style="width:80px;height:100px;object-fit:cover;border-radius:8px" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23f0ebe3%22 width=%22100%22 height=%22100%22/><text y=%22.55em%22 x=%2250%22 text-anchor=%22middle%22 font-size=%2230%22>👗</text></svg>'">
            <div style="font-size:.7rem;text-align:center;padding:2px">${cats[item.category]||''}</div>
          </div>
        `).join('')}
      </div>
      <button class="btn btn-sm btn-outline" style="margin-top:8px" onclick="deleteOutfit('${outfit.id}')">删除此记录</button>
    </div>`;
  }).join('');

function deleteOutfit(id) {
  if (!confirm('确定删除这条穿搭记录？')) return;
  const db = getDB();
  db.outfits = db.outfits.filter(o => o.id !== id);
  saveDB(db);

function calPrevMonth() {
  if (calMonth === 1) { calMonth = 12; calYear--; }
  else calMonth--;
  renderCalendar();
}

function calNextMonth() {
  if (calMonth === 12) { calMonth = 1; calYear++; }
  else calMonth++;
  renderCalendar();
}

  renderSceneSelector();

  // Register service worker
  if ('serviceWorker' in navigator) {
    // Create inline SW via blob
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}

function renderToday() {
  const db = getDB();
  // Check if we already have today's outfit
  const todayOutfit = db.outfits.find(o => o.date === todayStr());
  if (todayOutfit) {
    const items = todayOutfit.items.map(id => db.items.find(i => i.id === id)).filter(Boolean);
    if (items.length > 0) {
      currentOutfit = items;
      renderOutfitDisplay(items);
      return;
    }
  }
  generateOutfit();
}

init();
</script>
